name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Lint y formato son informativos por ahora: el código base aún no está
      # 100% limpio (formato/imports). No bloquean el merge; sirven para ver
      # regresiones. Cuando se haga un pase global de `yarn lint` + prettier,
      # quitar `continue-on-error` para volverlos bloqueantes.
      - name: Lint (no bloqueante)
        continue-on-error: true
        run: yarn eslint "{src,apps,libs,test}/**/*.ts"

      - name: Format check (no bloqueante)
        continue-on-error: true
        run: yarn prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Test
        run: yarn test --ci --passWithNoTests

      - name: Build
        run: yarn build
