name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn eslint "{src,apps,libs,test}/**/*.ts" --max-warnings=0

      - name: Format check
        run: yarn prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Test
        run: yarn test --ci --passWithNoTests

      - name: Build
        run: yarn build
