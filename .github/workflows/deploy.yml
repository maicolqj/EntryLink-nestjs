name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deploy triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "Deploy trigger failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
