services:
  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${PASSDB_POSTGRES}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      TZ: America/Bogota
    command:
      - postgres
      - -c
      - timezone=America/Bogota
      - -c
      - max_connections=50
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=8MB
      - -c
      - work_mem=4MB
      - -c
      - min_wal_size=256MB
      - -c
      - max_wal_size=1GB
    container_name: entrylink-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    container_name: entrylink-redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  app:
    image: ghcr.io/maicolqj/entrylink-nestjs:latest
    restart: unless-stopped
    container_name: entrylink-app
    environment:
      NODE_ENV: production
      TZ: America/Bogota
      PORT: 3001
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_NAME: ${DB_NAME}
      PASSDB_POSTGRES: ${PASSDB_POSTGRES}
      DB_SSL: ${DB_SSL:-false}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_QUEUE_DB: ${REDIS_QUEUE_DB:-1}
      REDIS_SOCKET_DB: ${REDIS_SOCKET_DB:-6}
      REDIS_PREFIX: ${REDIS_PREFIX:-app:}
      # JWT & Auth
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      FINGERPRINT_SECRET: ${FINGERPRINT_SECRET}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Mail
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      # Web Push / VAPID
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      # Cloudflare R2
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      # Bull Board
      BULL_BOARD_USER: ${BULL_BOARD_USER}
      BULL_BOARD_PASS: ${BULL_BOARD_PASS}
      # BullMQ
      BULL_REMOVE_ON_COMPLETE: ${BULL_REMOVE_ON_COMPLETE:-10}
      BULL_REMOVE_ON_FAIL: ${BULL_REMOVE_ON_FAIL:-5}
      BULL_ATTEMPTS: ${BULL_ATTEMPTS:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
