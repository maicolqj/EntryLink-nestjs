type Mutation {
  createPermission(input: CreatePermissionInput!): CreatePermissionResponse!

  """Update an existing permission"""
  updatePermission(id: String!, updatePermissionInput: UpdatePermissionInput!): UpdatePermissionResponse!

  """Soft delete a permission by setting status to false"""
  removePermission(id: String!): RemovePermissionResponse!

  """Restore a soft deleted permission by setting status to true"""
  restorePermission(id: String!): RestorePermissionResponse!
  createRole(input: CreateRoleInput!): SimpleRoleResponse!
  updateRole(id: String!, input: UpdateRoleInput!): Role!
  changeRoleParent(roleId: String!, newParentId: String): ChangeParentResponse!
  moveRoleSubtree(roleId: String!, newParentId: String): MoveSubtreeResponse!
  assignMultipleChildren(parentId: String!, childrenIds: [String!]!): AssignChildrenResponse!

  """Soft delete a role by setting status to false"""
  removeRole(id: String!): RemoveRoleResponse!

  """Restore a soft deleted role by setting status to true"""
  restoreRole(id: String!): RestoreRoleResponse!

  """Asigna un rol a un usuario"""
  assignRoleToUser(userId: String!, roleName: String!): AssignedUserRolResponse!

  """Asigna un rol a un usuario"""
  userHasRole(userId: String!, roleName: String!): AssignedUserRolResponse!

  """
  Crea un usuario administrativo (COMPLIANCE_OFFICER, COMPLEX, ACCOUNTANT, SUPERVISOR). Requiere rol SUPER_ADMIN_ROL.
  """
  createAdminUser(input: CreateAdminUserInput!): User!

  """
  Registra un nuevo residente en el complejo. Requiere rol COMPLEX_ROL. El residente recibirá su código de acceso.
  """
  registerResident(input: CreateResidentUserInput!): User!

  """
  Crea personal del complejo: guardia (SECURITY_ROL), supervisor (SUPERVISOR_ROL) o contador (ACCOUNTANT_ROL). El campo `role` determina el tipo. Requiere rol COMPLEX_ROL o SUPER_ADMIN_ROL.
  """
  createStaffMember(input: CreateStaffMemberInput!): User!

  """
  Elimina a un miembro del personal del complejo. Si el usuario tiene residencia activa en algún complejo, solo se le quita el rol de personal. Si no tiene ninguna residencia activa, se elimina del sistema. Requiere rol COMPLEX_ROL o SUPER_ADMIN_ROL.
  """
  removeStaffMember(input: RemoveStaffMemberInput!): RemoveStaffMemberResponse!

  """Cambiar la contraseña del usuario autenticado"""
  changePassword(input: ChangePasswordInput!): ChangePasswordResponse!
  updateUser(updateUserInput: UpdateUserInput!): User!
  removeUser(id: Int!): User!

  """
  Inicia sesión con email y contraseña. Disponible para: SUPER_ADMIN_ROL, COMPILANCE_OFFICER_ROL, COMPLEX_ROL
  """
  loginWithEmail(input: LoginEmailInput!): AuthResponse!

  """
  Solicita un código OTP al número de celular. Exclusivo para residentes (RESIDENT_ROL). El código se envía por SMS y tiene validez de 5 minutos.
  """
  requestOtp(input: RequestOtpInput!): OtpRequestResponse!

  """
  Verifica el código OTP del residente y devuelve los tokens JWT de acceso.
  """
  verifyOtp(input: VerifyOtpInput!): AuthResponse!

  """
  Renueva el access token usando el refresh token. Implementa rotación de tokens.
  """
  refreshToken(refreshToken: String!): AuthResponse!

  """Cierra la sesión actual e invalida los tokens."""
  logout: Boolean!
  createComplex(input: CreateComplexInput!): ResidentialComplex!
  updateComplex(input: UpdateComplexInput!): ResidentialComplex!
  changeComplexStatus(id: String!, status: ComplexStatus!): ResidentialComplex!
  removeComplex(id: String!): Boolean!
  restoreComplex(id: String!): ResidentialComplex!
  createBuilding(input: CreateBuildingInput!): Building!
  updateBuilding(input: UpdateBuildingInput!): Building!
  toggleBuildingStatus(id: String!): Building!
  removeBuilding(id: String!): Boolean!
  createUnit(input: CreateUnitInput!): Unit!
  updateUnit(input: UpdateUnitInput!): Unit!
  removeUnit(id: String!): Boolean!
