  reactivateResident(residentId: String!): Resident!
  moveOutResident(input: MoveOutResidentInput!): Resident!
  removeResident(id: String!): Boolean!
  approveResident(input: ApproveResidentInput!): Resident!
  rejectResident(input: RejectResidentInput!): Resident!
  blacklistVisitor(input: BlacklistVisitorInput!): Visitor!
