  registerWalkIn(input: RegisterWalkInInput!): Visit!
  validateQrAccess(qrToken: String!): QrValidationResponse!
  registerVisitorEntry(visitId: String!): Visit!
  registerVisitorExit(visitId: String!, notes: String): Visit!
  scheduleVisit(input: ScheduleVisitInput!): Visit!
  approveVisitEntry(visitId: String!): Visit!
  denyVisitEntry(visitId: String!, reason: String!): Visit!
  cancelVisit(visitId: String!): Visit!
  registerVehicle(input: RegisterVehicleInput!): Vehicle!
  updateVehicle(input: UpdateVehicleInput!): Vehicle!
  suspendVehicle(vehicleId: String!, reason: String!): Vehicle!
  reactivateVehicle(vehicleId: String!): Vehicle!
  removeVehicle(vehicleId: String!): Boolean!
  configureRotation(input: ConfigureRotationInput!): ParkingRotationConfig!
